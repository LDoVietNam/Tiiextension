<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ti Extension Agent</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="runtime-popup">
      <header>
        <h1>Ti Extension Agent</h1>
        <p>Browser automation companion</p>
      </header>
      <section class="runtime-card" aria-live="polite">
        <span class="label">Native runtime</span>
        <strong id="runtime-status">Checking native runtime…</strong>
      </section>
      <div class="runtime-actions">
        <button id="start-backend" class="primary" type="button">Start backend</button>
        <button id="stop-backend" type="button">Stop backend</button>
      </div>
      <button id="open-panel" class="panel-button" type="button">Open Extension Agent Console</button>
    </main>
    <script type="module" src="src/popup-controller.js"></script>
  </body>
</html>
